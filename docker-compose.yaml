version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: calcdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/database.sql:/docker-entrypoint-initdb.d/database.sql

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - mysql

  web:
    build: ./web
    container_name: web
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  db_data:
