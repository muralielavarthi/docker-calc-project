version: "3.8"
networks:
  expense_network:
    driver: bridge

volumes:
  db_data:

services:
  database:
    image: muralielavarthi/database:1.0.0
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - expense_network

  backend:
    image: muralielavarthi/backend:1.0.0
    command: sh -c "sleep 20 && node app.js"
    container_name: backend
    env_file: .env
    networks:
      - expense_network
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      - database

  web:
    image: muralielavarthi/frontend:1.0.0
    container_name: web
    env_file: .env
    networks:
      - expense_network
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    depends_on:
      - backend
